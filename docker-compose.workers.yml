  #     mode: replicated
  #     replicas: 3
  #     resources:
  #       limits:
  #         cpus: '1'
  #         memory: 1G
  #       reservations:
  #         cpus: '0.5'
  #         memory: 512M
  #   healthcheck:
  #     test: ["CMD", "pg_isready", "-U", "postgres", "-d", "$$DATABASE_URL"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 40s

# ============================================================
# PM2 Alternative (for Node.js environments)
# ============================================================
# Instead of Docker, you can use PM2 to run multiple worker instances:
#
# ecosystem.config.js:
#   module.exports = {
#     apps: [
#       { name: 'worker-1', script: 'apps/api/dist/utils/worker.js' },
#       { name: 'worker-2', script: 'apps/api/dist/utils/worker.js' },
#       { name: 'worker-3', script: 'apps/api/dist/utils/worker.js' },
#     ]
#   }
#
# Run with:
#   pm2 start ecosystem.config.js
#   pm2 scale worker-1 3
# ============================================================

