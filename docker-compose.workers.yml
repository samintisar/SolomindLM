# ============================================================
# Docker Compose - Horizontal Scaling for Graphile Worker
# ============================================================
# This file demonstrates how to run multiple Graphile Worker instances
# for horizontal scaling. PostgreSQL's SKIP LOCKED mechanism ensures
# jobs are not processed by multiple workers simultaneously.
#
# Usage:
#   docker-compose -f docker-compose.workers.yml up -d
#
# Scaling:
#   docker-compose -f docker-compose.workers.yml up -d --scale worker=5
#
# Total Capacity: worker_count × WORKER_CONCURRENCY
# Example: 5 workers × 5 concurrency = 25 concurrent jobs
# ============================================================

version: '3.8'

services:
  # ============================================================
  # Worker Instance 1 (Default)
  # ============================================================
  worker-1:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: node apps/api/dist/utils/worker.js
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      WORKER_CONCURRENCY: 5
      WORKER_INSTANCES: 3
      DB_POOL_MAX: 20
      # ... other environment variables
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "$$DATABASE_URL"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # Worker Instance 2
  # ============================================================
  worker-2:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: node apps/api/dist/utils/worker.js
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      WORKER_CONCURRENCY: 5
      WORKER_INSTANCES: 3
      DB_POOL_MAX: 20
      # ... other environment variables
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "$$DATABASE_URL"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # Worker Instance 3
  # ============================================================
  worker-3:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: node apps/api/dist/utils/worker.js
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      WORKER_CONCURRENCY: 5
      WORKER_INSTANCES: 3
      DB_POOL_MAX: 20
      # ... other environment variables
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "$$DATABASE_URL"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # Alternative: Scalable Worker Service
  # ============================================================
  # Uncomment this section and use Docker Swarm's scale feature:
  #   docker stack deploy -c docker-compose.workers.yml mystack
  #   docker service scale mystack_worker=5
  #
  # worker:
  #   build:
  #     context: .
  #     dockerfile: apps/api/Dockerfile
  #   command: node apps/api/dist/utils/worker.js
  #   environment:
  #     NODE_ENV: production
  #     DATABASE_URL: ${DATABASE_URL}
  #     WORKER_CONCURRENCY: 5
  #     WORKER_INSTANCES: 5
  #     DB_POOL_MAX: 30
  #   restart: unless-stopped
