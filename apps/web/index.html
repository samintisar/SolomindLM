<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/SolomindLM_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolomindLM</title>
    <!-- Fonts: Libre Baskerville (Headings), Lora (Body), IBM Plex Mono (Code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <style>
      /* Smooth collapsible transitions */
      .panel-transition {
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease-in-out;
      }
      /* Custom Scrollbar for Vintage feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted-foreground);
        border: 2px solid transparent;
        background-clip: content-box;
      }
    </style>
    <link rel="stylesheet" href="/src/index.css">
</head>
  <body class="bg-background text-foreground antialiased font-serif selection:bg-accent selection:text-accent-foreground">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
