<html lang="en" spellcheck="false">

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>SolomindLM - AI Research Tool & Learning Partner</title>
    <meta name="title" content="SolomindLM - AI Research Tool & Learning Partner" />

    <meta name="author" content="SolomindLM" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://solomindlm.com/" />
    <meta property="twitter:title" content="SolomindLM - AI Research Tool & Learning Partner" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- Additional SEO -->
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Convex (performance) -->
    <link rel="preconnect" href="https://tame-gecko-736.convex.cloud" />
    <link rel="dns-prefetch" href="https://tame-gecko-736.convex.site" />
    <!-- Fonts: Inter (UI), Libre Baskerville (display/marketing), Lora (body prose), IBM Plex Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <style>
      /* Smooth collapsible transitions */
      .panel-transition {
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease-in-out;
      }
      /* Custom Scrollbar for Vintage feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted-foreground);
        border: 2px solid transparent;
        background-clip: content-box;
      }
    </style>
    <link rel="stylesheet" href="/src/index.css">
</head>
  <body class="bg-background text-foreground antialiased font-serif selection:bg-accent selection:text-accent-foreground">

  </body>
</html>
