<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolomindLM</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              border: "var(--border)",
              input: "var(--input)",
              ring: "var(--ring)",
              background: "var(--background)",
              foreground: "var(--foreground)",
              primary: {
                DEFAULT: "var(--primary)",
                foreground: "var(--primary-foreground)",
              },
              secondary: {
                DEFAULT: "var(--secondary)",
                foreground: "var(--secondary-foreground)",
              },
              destructive: {
                DEFAULT: "var(--destructive)",
                foreground: "var(--destructive-foreground)",
              },
              muted: {
                DEFAULT: "var(--muted)",
                foreground: "var(--muted-foreground)",
              },
              accent: {
                DEFAULT: "var(--accent)",
                foreground: "var(--accent-foreground)",
              },
              popover: {
                DEFAULT: "var(--popover)",
                foreground: "var(--popover-foreground)",
              },
              card: {
                DEFAULT: "var(--card)",
                foreground: "var(--card-foreground)",
              },
              sidebar: {
                DEFAULT: "var(--sidebar)",
                foreground: "var(--sidebar-foreground)",
                primary: "var(--sidebar-primary)",
                "primary-foreground": "var(--sidebar-primary-foreground)",
                accent: "var(--sidebar-accent)",
                "accent-foreground": "var(--sidebar-accent-foreground)",
                border: "var(--sidebar-border)",
                ring: "var(--sidebar-ring)",
              },
            },
            fontFamily: {
              sans: ["var(--font-sans)"],
              serif: ["var(--font-serif)"],
              mono: ["var(--font-mono)"],
            },
            boxShadow: {
              'xs': "var(--shadow-xs)",
              'sm': "var(--shadow-sm)",
              'md': "var(--shadow-md)",
              'lg': "var(--shadow-lg)",
              'xl': "var(--shadow-xl)",
              '2xl': "var(--shadow-2xl)",
            }
          },
        },
      }
    </script>
    <!-- Fonts: Libre Baskerville (Headings), Lora (Body), IBM Plex Mono (Code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <style>
      /* Smooth collapsible transitions */
      .panel-transition {
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease-in-out;
      }
      /* Custom Scrollbar for Vintage feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted-foreground);
        border: 2px solid transparent;
        background-clip: content-box;
      }
    </style>
    <link rel="stylesheet" href="/src/index.css">
</head>
  <body class="bg-background text-foreground antialiased font-serif selection:bg-accent selection:text-accent-foreground overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
