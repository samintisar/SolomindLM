# PR: typecheck + Vite build (placeholder Convex URL).
# main: typecheck + production web build only. Convex deploy runs on Vercel Production only —
# running `convex deploy` here and on Vercel at the same time causes 409 ExistingModuleHashConflict.
# Set repo variable VITE_CONVEX_URL to prod https://….convex.cloud (same as after deploy). See README.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  typecheck-convex:
    name: Typecheck (Convex)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert Vercel production build runs convex deploy
        run: |
          if ! grep -qF 'convex deploy' apps/web/vercel.json; then
            echo "::error::apps/web/vercel.json buildCommand must include convex deploy for non-preview, or production Convex and Vite can drift"
            exit 1
          fi
          if ! grep -qF 'VERCEL_ENV' apps/web/vercel.json; then
            echo "::error::buildCommand should branch on VERCEL_ENV (preview = build only, else = convex deploy + build)"
            exit 1
          fi
          if ! grep -qF 'preview' apps/web/vercel.json; then
            echo "::error::buildCommand should keep preview on build-only to avoid preview overwriting prod Convex"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck Convex
        run: bun run typecheck:convex

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Convex Tests
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: bun run test:convex

      - name: Run Web Tests
        run: bun run test:web

  test-coverage:
    name: Coverage Report
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Coverage
        run: bun run test:web:coverage

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/web/coverage/

  typecheck-mobile:
    name: Typecheck (Expo mobile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck mobile
        run: bun run typecheck:mobile

  build-web:
    name: Build (Web, PR parity)
    needs: [typecheck-convex, typecheck-mobile]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Web
        env:
          VITE_CONVEX_URL: "https://ci-placeholder.convex.cloud"
        run: bun run --filter @solomindlm/web build

  build-web-main:
    name: Build web (main, prod Convex URL — no deploy)
    needs: [typecheck-convex, typecheck-mobile]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web (parity with Vite step after Vercel convex deploy)
        env:
          VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
        run: |
          if [ -z "${VITE_CONVEX_URL}" ]; then
            echo "::error::Set repository variable VITE_CONVEX_URL to your production Convex URL (https://….convex.cloud). CI must not run convex deploy on main alongside Vercel — that causes Convex 409 ExistingModuleHashConflict."
            exit 1
          fi
          bun run build:prod

  test-e2e:
    name: E2E Tests (${{ matrix.shard }}/${{ strategy.matrix.total }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        total: [2]
        shard: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/${{ matrix.total }})
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: bunx playwright test --shard=${{ matrix.shard }}/${{ matrix.total }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
