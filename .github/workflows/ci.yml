# CI for Convex + web app. For production deploy, add CONVEX_DEPLOY_KEY secret
# and use: npx convex deploy --cmd "bun run --filter @solomindlm/web build"
# See https://docs.convex.dev/testing/ci and https://docs.convex.dev/cli/deploy-key-types

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-web:
    name: Build (Web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck Convex
        run: bun run typecheck:convex

      - name: Build Web
        env:
          VITE_CONVEX_URL: "https://ci-placeholder.convex.cloud"
        run: bun run --filter @solomindlm/web build
